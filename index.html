<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Поиск ячейки</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{margin:0;font:16px/1.4 Roboto;background:#f5f5f5}
    #top{position:fixed;top:0;left:0;right:0;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.15);padding:8px 12px;z-index:99}
    iframe{width:100%;height:100vh;border:none;margin-top:48px}
  </style>
</head>
<body>
  <div id="top">Ищем: <b id="what"></b></div>
  <iframe id="frame"></iframe>

<script>
/* ==============  настройки  ============== */
const SHEET_ID = '1Viq7hFmBTAaHzp39-0xZhEc658cRTNa9eauwIS1A0HU'; // ← ваша книга
const ID       = new URLSearchParams(location.search).get('id');  // параметр ?id=123
/* ========================================= */

if (!ID) { document.body.innerHTML = 'Добавьте параметр ?id='; throw 0; }

document.getElementById('what').textContent = ID;

// 1. Открываем «htmlview» — лёгкий read-only режим, который точно работает на телефоне
const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/htmlpreview`;
document.getElementById('frame').src = url;

// 2. Когда фрейм загрузится — ищем ячейку
window.onload = () => {
  const f = document.getElementById('frame');
  f.onload = () => {
    try {
      const doc = f.contentDocument || f.contentWindow.document;
      const tds = doc.querySelectorAll('td');
      for (const td of tds) {
        if (td.textContent.trim() === ID) {
          td.style.background = '#ffeb3b';   // жёлтый
          td.scrollIntoView({block:'center',behavior:'smooth'});
          return;
        }
      }
    } catch(e) {}
    // кросс-домен — пробуем ещё раз
    setTimeout(() => f.onload(), 500);
  };
};
</script>
</body>
</html>
